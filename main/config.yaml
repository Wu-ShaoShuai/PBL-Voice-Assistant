server:
  ip: 0.0.0.0
  port: 8000

log:
  log_level: INFO
  log_dir: tmp
  log_file: server.log
  data_dir: data
  log_format: "<green>{time:YYMMDD HH:mm:ss}</green>[<light-blue>{extra[tag]}</light-blue>]-<level>{level}</level>-<light-green>{message}</light-green>"
  log_format_file: "{time:YYYY-MM-DD HH:mm:ss} - {name} - {level} - {extra[tag]} - {message}"

# 模块选择（根据实际使用开启）
asr_provider: fun_local
llm_provider: openai
tts_provider: edge
intent_provider: nointent   # 若不需意图识别，可删并在代码中 init_intent=False
# vad_provider: SileroVAD  # 若不需要可注释
memory_provider: nomem

ASR:
  fun_local:              
    model_dir: models/SenseVoiceSmall
    output_dir: tmp/

TTS:
  edge:
    voice: zh-CN-XiaoxiaoNeural
    output_dir: tmp/

LLM:
  openai:
    model_name: glm-4-flash
    url: https://open.bigmodel.cn/api/paas/v4/
    api_key: your_key
    temperature: 0.7
    max_tokens: 500

# VAD（若不需要可整块删除）
VAD:
  SileroVAD:
    threshold: 0.5
    model_dir: models/snakers4_silero-vad

# 记忆（nomem 无需额外配置）
Memory:
  nomem:
    type: nomem

Intent:
  nointent:
    type: nointent

prompt_template: agent-base-prompt.txt
system_error_response: "服务繁忙，请稍后再试。"